# ── VPN Node — prod stack ─────────────────────────────────────────────────────
# Поднимает три сервиса одной командой: docker compose up -d
# Перед первым запуском выполнить: bash scripts/init.sh (или: make init)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── 3x-ui: панель управления VLESS ─────────────────────────────────────────
  3x-ui:
    image: ghcr.io/mhsanaei/3x-ui:v2.4.5
    container_name: 3x-ui
    hostname: vpn-node            # можно заменить на имя сервера
    network_mode: host            # Xray Reality требует прямой доступ к портам хоста
    tty: true
    environment:
      XRAY_VMESS_AEAD_FORCED: "false"
    volumes:
      - ./db:/etc/x-ui            # БД sqlite + конфиг панели
      - ./cert:/root/cert         # TLS-сертификаты (опционально)
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ── mtg: MTProto-прокси ─────────────────────────────────────────────────────
  # Секрет хранится в config/mtg/config.toml (генерируется scripts/init.sh).
  # MTG_SERVER_IP и MTG_PORT берутся из .env
  mtproto-proxy:
    image: nineseconds/mtg:2
    container_name: mtproto-proxy
    ports:
      - "${MTG_SERVER_IP}:${MTG_PORT}:3128"
    volumes:
      - ./config/mtg:/config:ro   # config.toml монтируется read-only
    command: run /config/config.toml
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── Node Agent: REST API для Orchestrator ───────────────────────────────────
  # Собирает образ из Dockerfile в корне репо.
  # Слушает только на 127.0.0.1:8080 — снаружи через nginx с TLS (Этап 9).
  # Связь с host-сетевой 3x-ui — через host.docker.internal (extra_hosts).
  # XUI_BASE_URL в .env должен быть http://host.docker.internal:2053
  node-agent:
    build: .
    image: vpn-node-agent:latest
    container_name: node-agent
    ports:
      - "127.0.0.1:8080:8080"
    env_file: .env
    volumes:
      # Тот же config.toml, что читает mtproto-proxy — секрет mtg
      - ./config/mtg/config.toml:/etc/mtg/config.toml:ro
    extra_hosts:
      # host-gateway резолвится в IP хост-машины, нужен для доступа к 3x-ui
      - "host.docker.internal:host-gateway"
    depends_on:
      - 3x-ui
      - mtproto-proxy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
