# Node Agent — nginx reverse proxy (HTTPS 8443)
# ─────────────────────────────────────────────────────────────────────────────
# Установка на сервере — см. DEPLOY.md, раздел «nginx + TLS».
# Краткий вариант:
#   sudo cp nginx/node-agent.conf /etc/nginx/sites-available/node-agent
#   sudo ln -sf /etc/nginx/sites-available/node-agent /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 8443 ssl;
    server_name _;

    # ── TLS ──────────────────────────────────────────────────────────────────
    # Self-signed (быстрый старт, команда в DEPLOY.md):
    ssl_certificate     /etc/nginx/ssl/node-agent.crt;
    ssl_certificate_key /etc/nginx/ssl/node-agent.key;
    #
    # Для прода заменить на Let's Encrypt (certbot):
    #   ssl_certificate     /etc/letsencrypt/live/<domain>/fullchain.pem;
    #   ssl_certificate_key /etc/letsencrypt/live/<domain>/privkey.pem;

    # ── Allowlist по IP Orchestrator'а ───────────────────────────────────────
    # Раскомментировать после того как убедитесь, что всё работает:
    # allow <ORCHESTRATOR_IP>;
    # deny all;

    # ── Proxy → node-agent ───────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8080;

        # Заголовки для корректного client_ip в structlog (--proxy-headers в Dockerfile CMD)
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты: connect < httpx timeout (10s), read с запасом под 3x-ui round-trip
        proxy_connect_timeout  5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    10s;
    }
}
